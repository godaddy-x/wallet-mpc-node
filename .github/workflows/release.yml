name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: |
          chmod +x build_release.sh
          ./build_release.sh

      - name: Generate SHA256SUMS
        working-directory: output
        run: |
          sha256sum wallet-mpc-node-* > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            output/wallet-mpc-node-linux-amd64
            output/wallet-mpc-node-linux-arm64
            output/wallet-mpc-node-darwin-amd64
            output/wallet-mpc-node-darwin-arm64
            output/wallet-mpc-node-windows-amd64.exe
            output/SHA256SUMS
